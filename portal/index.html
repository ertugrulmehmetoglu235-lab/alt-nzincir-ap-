<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>AltınZincir Portal — Canlı Piyasa Verileri</title>
    <meta name="description" content="Altın, döviz, kripto ve emtia fiyatları — canlı veri portalı">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #f0f0f5;
            --muted: #8888aa;
            --dim: #555570;
            --gold: #f5c842;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        /* TOP BAR */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 17, 23, .95);
            backdrop-filter: blur(8px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--gold)
        }

        .logo i {
            font-size: 1.3rem
        }

        .update-badge {
            font-size: .75rem;
            color: var(--muted);
            background: var(--card);
            padding: .3rem .7rem;
            border-radius: 20px
        }

        /* MAIN LAYOUT */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem
        }

        /* SECTION HEADER */
        .section-title {
            font-size: .85rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: .8rem
        }

        /* TICKER STRIP */
        .ticker-wrap {
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            padding: .5rem 0
        }

        .ticker-inner {
            display: flex;
            gap: 2rem;
            animation: tick 30s linear infinite;
            white-space: nowrap;
            padding: 0 1rem
        }

        @keyframes tick {
            0% {
                transform: translateX(0)
            }

            100% {
                transform: translateX(-50%)
            }
        }

        .ticker-item {
            font-size: .8rem;
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .ticker-item .name {
            color: var(--muted)
        }

        .ticker-item .price {
            font-weight: 700
        }

        .ticker-item .up {
            color: var(--green)
        }

        .ticker-item .down {
            color: var(--red)
        }

        /* PRICE CARDS */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem
        }

        .price-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            cursor: pointer;
            transition: border-color .2s, transform .15s;
        }

        .price-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px)
        }

        .price-card.active {
            border-color: var(--gold)
        }

        .pc-top {
            display: flex;
            align-items: center;
            gap: .7rem;
            margin-bottom: .8rem
        }

        .pc-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .pc-name {
            font-size: .8rem;
            color: var(--muted)
        }

        .pc-code {
            font-size: .75rem;
            color: var(--dim);
            font-weight: 600
        }

        .pc-price {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: .3rem
        }

        .pc-change {
            font-size: .8rem;
            font-weight: 600
        }

        .pc-change.up {
            color: var(--green)
        }

        .pc-change.down {
            color: var(--red)
        }

        /* CAT FILTER */
        .cat-bar {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem
        }

        .cat-btn {
            padding: .4rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }

        .cat-btn:hover,
        .cat-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold)
        }

        /* CHART PANEL */
        .chart-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: gap
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 700
        }

        .chart-subtitle {
            font-size: .8rem;
            color: var(--muted)
        }

        .tf-row {
            display: flex;
            gap: .4rem
        }

        .tf-btn {
            padding: .3rem .7rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: .75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: .15s;
        }

        .tf-btn:hover,
        .tf-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold)
        }

        #myChart {
            max-height: 320px
        }

        /* BOTTOM GRID */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem
        }

        @media(max-width:900px) {
            .bottom-grid {
                grid-template-columns: 1fr
            }
        }

        /* NEWS */
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            overflow: hidden
        }

        .panel-title {
            font-size: .9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .news-item {
            padding: .75rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: .3rem
        }

        .news-item:last-child {
            border: none
        }

        .news-source {
            font-size: .7rem;
            color: var(--gold);
            font-weight: 700
        }

        .news-title {
            font-size: .85rem;
            line-height: 1.4
        }

        .news-time {
            font-size: .7rem;
            color: var(--dim)
        }

        /* CALENDAR */
        .cal-item {
            padding: .6rem 0;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: .6rem;
            align-items: center
        }

        .cal-item:last-child {
            border: none
        }

        .imp-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .imp-high {
            background: #ef4444
        }

        .imp-med {
            background: #f59e0b
        }

        .imp-low {
            background: #22c55e
        }

        .cal-name {
            font-size: .82rem
        }

        .cal-country {
            font-size: .7rem;
            color: var(--muted)
        }

        .cal-time {
            font-size: .75rem;
            color: var(--dim);
            white-space: nowrap
        }

        /* LOADING */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 999;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #loadingOverlay.hidden {
            display: none
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div style="color:var(--muted);font-size:.9rem">Veriler yükleniyor...</div>
    </div>

    <!-- Header -->
    <header>
        <div class="logo"><i class="fas fa-link"></i> AltınZincir Portal</div>
        <div class="update-badge" id="updateBadge"><i class="fas fa-circle" style="color:#22c55e;font-size:.5rem"></i>
            Yükleniyor...</div>
    </header>

    <!-- Ticker -->
    <div class="ticker-wrap">
        <div class="ticker-inner" id="tickerInner"></div>
    </div>

    <div class="container">

        <!-- Category Filter -->
        <div class="cat-bar" id="catBar">
            <button class="cat-btn active" onclick="setCat('all',this)">Tümü</button>
            <button class="cat-btn" onclick="setCat('gold',this)"><i class="fas fa-gem"></i> Altın</button>
            <button class="cat-btn" onclick="setCat('currency',this)"><i class="fas fa-money-bill"></i> Döviz</button>
            <button class="cat-btn" onclick="setCat('crypto',this)"><i class="fab fa-bitcoin"></i> Kripto</button>
            <button class="cat-btn" onclick="setCat('commodity',this)"><i class="fas fa-boxes-stacked"></i>
                Emtia</button>
        </div>

        <!-- Price Cards -->
        <p class="section-title">Fiyatlar</p>
        <div class="cards-grid" id="cardsGrid"></div>

        <!-- Chart -->
        <div class="chart-panel">
            <div class="chart-header">
                <div>
                    <div class="chart-title" id="chartTitle">— Grafik</div>
                    <div class="chart-subtitle" id="chartSubtitle">Bir kart seçin</div>
                </div>
                <div class="tf-row">
                    <button class="tf-btn" onclick="setTF('1M',this)">1A</button>
                    <button class="tf-btn" onclick="setTF('3M',this)">3A</button>
                    <button class="tf-btn active" onclick="setTF('1Y',this)">1Y</button>
                    <button class="tf-btn" onclick="setTF('3Y',this)">3Y</button>
                    <button class="tf-btn" onclick="setTF('5Y',this)">5Y</button>
                </div>
            </div>
            <canvas id="myChart"></canvas>
        </div>

        <!-- Bottom: News + Calendar -->
        <div class="bottom-grid">
            <div class="panel">
                <div class="panel-title"><i class="fas fa-newspaper" style="color:var(--gold)"></i> Haberler</div>
                <div id="newsList">
                    <div style="color:var(--dim);font-size:.85rem">Haberler yükleniyor...</div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title"><i class="fas fa-calendar" style="color:var(--gold)"></i> Ekonomik Takvim</div>
                <div id="calList"></div>
                <!-- TradingView Economic Calendar Widget fallback -->
                <div class="tradingview-widget-container" style="margin-top:.5rem">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript"
                        src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                            { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "350", "locale": "tr", "importanceFilter": "0,1" }
                        </script>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ── CONFIG ────────────────────────────────────────────────────────
        const DATA_URL = 'https://ertugrulmehmetoglu235-lab.github.io/alt-nzincir-ap-/API_DOSYALARI/data.json';
        const NEWS_URL = 'https://rss2json.com/api.json?rss_url=https%3A%2F%2Fwww.bloomberght.com%2Frss';

        let catalog = {};
        let currentItem = null;
        let currentTF = '1Y';
        let chartInstance = null;
        let curCat = 'all';

        // ── ICON HELPERS ─────────────────────────────────────────────────
        function iconStyle(t) {
            if (t === 'gold') return 'background:#f5c842;color:#000';
            if (t === 'currency') return 'background:#1a1d27;color:#f0f0f5;border:1px solid #2a2d3a';
            if (t === 'crypto') return 'background:#f7931a;color:#fff';
            if (t === 'commodity') return 'background:#0e9f6e;color:#fff';
            if (t === 'stock') return 'background:#1a56db;color:#fff';
            return 'background:#333;color:#fff';
        }
        function iconText(item) {
            if (item.type === 'currency') {
                return item.code === 'USD' ? '$' : item.code === 'EUR' ? '€' : item.code === 'GBP' ? '£' : item.code.slice(0, 2);
            }
            if (item.type === 'crypto') return item.code.slice(0, 1);
            if (item.type === 'gold') return (item.name || '').slice(0, 1);
            return (item.code || '').slice(0, 2);
        }
        function fmtTRY(v) {
            if (!v && v !== 0) return '—';
            return Number(v).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ── RENDER CARDS ─────────────────────────────────────────────────
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const items = Object.values(catalog).filter(i => {
                if (!i.current || i.current <= 0) return false;
                if (curCat === 'all') return true;
                return i.type === curCat;
            }).sort((a, b) => {
                const order = { gold: 0, currency: 1, crypto: 2, commodity: 3, stock: 4 };
                return (order[a.type] || 5) - (order[b.type] || 5);
            });

            grid.innerHTML = items.map(item => {
                const up = item.change >= 0;
                const chgStr = (isNaN(item.change) ? 0 : Math.abs(item.change)).toFixed(2);
                return `
    <div class="price-card${currentItem?.id === item.id ? ' active' : ''}" onclick="selectItem('${item.id}')">
      <div class="pc-top">
        <div class="pc-icon" style="${iconStyle(item.type)}">${iconText(item)}</div>
        <div>
          <div class="pc-code">${item.code || item.id}</div>
          <div class="pc-name">${item.name || item.id}</div>
        </div>
      </div>
      <div class="pc-price">₺${fmtTRY(item.current)}</div>
      <div class="pc-change ${up ? 'up' : 'down'}">
        ${up ? '▲' : '▼'} %${chgStr}
      </div>
    </div>`;
            }).join('');
        }

        function setCat(cat, btn) {
            curCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        // ── TICKER ────────────────────────────────────────────────────────
        function buildTicker() {
            const featured = ['gram-altin', 'USD', 'EUR', 'btc', 'eth', 'ons', 'sol'];
            const items = featured.map(k => catalog[k]).filter(Boolean);
            const html = items.map(i => {
                const up = i.change >= 0;
                return `<span class="ticker-item">
      <span class="name">${i.name}</span>
      <span class="price">₺${fmtTRY(i.current)}</span>
      <span class="${up ? 'up' : 'down'}">${up ? '▲' : '▼'}${Math.abs(i.change || 0).toFixed(2)}%</span>
    </span>`;
            }).join('');
            // Duplicate for seamless loop
            const t = document.getElementById('tickerInner');
            t.innerHTML = html + html;
        }

        // ── CHART ─────────────────────────────────────────────────────────
        function selectItem(id) {
            currentItem = catalog[id];
            document.querySelectorAll('.price-card').forEach(c => {
                c.classList.toggle('active', c.onclick?.toString().includes(`'${id}'`));
            });
            drawChart();
            // Rebuild cards to show active border
            renderCards();
        }

        function setTF(tf, btn) {
            currentTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            drawChart();
        }

        function sliceHistory(hist, tf) {
            const pts = {
                '1M': 30, '3M': 90, '1Y': 365, '3Y': 1095, '5Y': 1826
            };
            const n = pts[tf] || 365;
            return hist.slice(-n);
        }

        function drawChart() {
            if (!currentItem || !currentItem.history || currentItem.history.length < 2) return;
            const hist = sliceHistory(currentItem.history, currentTF);

            document.getElementById('chartTitle').textContent = currentItem.name + ' Fiyat Grafiği';
            document.getElementById('chartSubtitle').textContent =
                `Son ${hist.length} gün · Son: ₺${fmtTRY(hist[hist.length - 1])}`;

            const labels = hist.map((_, i) => i);
            const isUp = hist[hist.length - 1] >= hist[0];
            const color = isUp ? '#22c55e' : '#ef4444';

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('myChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: hist,
                        borderColor: color,
                        backgroundColor: color + '18',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: () => '',
                                label: ctx => `₺${fmtTRY(ctx.raw)}`
                            }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            grid: { color: '#2a2d3a' },
                            ticks: {
                                color: '#8888aa',
                                callback: v => '₺' + Number(v).toLocaleString('tr-TR', { maximumFractionDigits: 0 })
                            }
                        }
                    }
                }
            });
        }

        // ── NEWS ──────────────────────────────────────────────────────────
        async function loadNews() {
            const el = document.getElementById('newsList');
            try {
                const res = await fetch(NEWS_URL);
                const d = await res.json();
                if (d.status === 'ok' && d.items?.length) {
                    el.innerHTML = d.items.slice(0, 6).map(item => `
        <div class="news-item">
          <span class="news-source">BloombergHT</span>
          <a href="${item.link}" target="_blank" style="color:var(--text);text-decoration:none">
            <div class="news-title">${item.title}</div>
          </a>
          <span class="news-time">${new Date(item.pubDate).toLocaleString('tr-TR', { dateStyle: 'short', timeStyle: 'short' })}</span>
        </div>`).join('');
                } else {
                    throw new Error('no items');
                }
            } catch {
                // Fallback: static message
                el.innerHTML = `<div style="color:var(--dim);font-size:.82rem;padding:.5rem 0">
      Haberler yüklenemedi. <a href="https://www.bloomberght.com" target="_blank" style="color:var(--gold)">BloombergHT'yi ziyaret et →</a>
    </div>`;
            }
        }

        // ── MAIN INIT ─────────────────────────────────────────────────────
        async function init() {
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                const raw = await res.json();

                // Build catalog
                Object.entries(raw).forEach(([k, v]) => {
                    if (!v || !v.name) return;
                    catalog[k] = {
                        id: k,
                        name: v.name,
                        code: v.code || k.toUpperCase(),
                        type: v.type || 'other',
                        current: v.current || 0,
                        selling: v.selling || v.current || 0,
                        buying: v.buying || v.current || 0,
                        change: v.change || 0,
                        history: Array.isArray(v.history) ? v.history : []
                    };
                });

                // Update badge
                const updateDate = raw['gram-altin']?.last_update || 'Bilinmiyor';
                document.getElementById('updateBadge').innerHTML =
                    `<i class="fas fa-circle" style="color:#22c55e;font-size:.5rem"></i> ${updateDate}`;

                renderCards();
                buildTicker();

                // Auto-select gram altın
                if (catalog['gram-altin']) selectItem('gram-altin');

                // Load news
                loadNews();

                document.getElementById('loadingOverlay').classList.add('hidden');
            } catch (e) {
                document.getElementById('loadingOverlay').innerHTML =
                    `<i class="fas fa-exclamation-triangle" style="color:#ef4444;font-size:2rem"></i>
       <div style="color:var(--muted)">Veri yüklenemedi: ${e.message}</div>`;
            }
        }

        init();
    </script>
</body>

</html>
