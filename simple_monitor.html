<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Debug Monitor</title>
    <style>
        body {
            background: #222;
            color: #eee;
            font-family: monospace;
            padding: 20px;
        }
    </style>
</head>

<body>
    <h3>Debug Konsolu</h3>
    <pre id="log" style="border:1px solid #555; padding:10px; height:80vh; overflow:auto;"></pre>

    <script>
        const log = document.getElementById('log');
        function debugLog(...args) {
            log.innerHTML += args.join(' ') + '<br>';
            console.log(...args);
        }

        const TRUNCGIL_URL = 'https://api.truncgil.com/v1/today.json';
        const BINANCE_URL = 'https://api.binance.com/api/v3/ticker/24hr';
        let globalCatalog = {};
        let usdTry = 0;

        async function runTest() {
            debugLog('🔄 TEST BAŞLIYOR...');

            // Helper functions
            const parseTR = (s) => parseFloat(String(s).replace(/[$€TL\s]/g, '').replace(/\./g, '').replace(',', '.'));
            const parseNum = (s) => parseFloat(String(s).replace(',', '.'));

            // 1. Truncgil Test
            try {
                debugLog('--- Truncgil İsteği Gönderiliyor ---');
                const tRes = await fetch(TRUNCGIL_URL + '?t=' + Date.now());
                const tData = await tRes.json();
                debugLog('✅ Truncgil Yanıtı Alındı (Keys:', Object.keys(tData).length, ')');
                if (tData['USD']) {
                    usdTry = parseTR(tData['USD'].Satış);
                    debugLog('USD/TRY:', usdTry);
                }
            } catch (e) {
                debugLog('❌ Truncgil Hatası:', e.message);
            }

            // 2. GenelPara Test (Döviz)
            const gpBase = 'https://api.genelpara.com/json/';
            try {
                debugLog('--- GenelPara Döviz İsteği ---');
                const res = await fetch(gpBase + '?list=doviz&sembol=all');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                debugLog('✅ GenelPara Döviz Yanıtı:', Object.keys(data).length, 'veri');
            } catch (e) {
                debugLog('❌ GenelPara Döviz Hatası:', e.message);
            }

            // 3. GenelPara Test (Emtia)
            try {
                debugLog('--- GenelPara Emtia İsteği ---');
                const res = await fetch(gpBase + '?list=emtia&sembol=all');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                debugLog('✅ GenelPara Emtia Yanıtı:', Object.keys(data).length, 'veri');
            } catch (e) {
                debugLog('❌ GenelPara Emtia Hatası:', e.message);
            }

            // 4. GenelPara Test (Hisse)
            try {
                debugLog('--- GenelPara Hisse İsteği ---');
                const res = await fetch(gpBase + '?list=hisse&sembol=all');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                debugLog('✅ GenelPara Hisse Yanıtı:', Object.keys(data).length, 'veri');
            } catch (e) {
                debugLog('❌ GenelPara Hisse Hatası:', e.message);
            }

            // 5. Binance Test
            try {
                debugLog('--- Binance İsteği ---');
                const bRes = await fetch(BINANCE_URL);
                if (!bRes.ok) throw new Error('HTTP ' + bRes.status);
                const bData = await bRes.json();
                debugLog('✅ Binance Yanıtı:', bData.length, 'veri');
            } catch (e) {
                debugLog('❌ Binance Hatası:', e.message);
            }

            debugLog('🏁 TEST TAMAMLANDI');
        }

        runTest();
    </script>
</body>

</html>
